services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - ./mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartbase-a4
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
    depends_on:
      - mongodb
    ports:
      - "3000:3000"
    volumes:
      - ./seed_flag:/app/.seeded_vol
